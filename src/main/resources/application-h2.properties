# ==================================================
# 考勤管理系统 - H2 嵌入式数据库配置
# 使用方式：mvn jetty:run -Dspring.profiles.active=h2
# ==================================================

# ------------------ H2 数据库连接配置 ------------------
# MODE=MySQL: 兼容 MySQL 语法
# DATABASE_TO_LOWER=TRUE: 表名列名转小写（兼容 MySQL 行为）
# DB_CLOSE_DELAY=-1: 保持数据库打开直到 JVM 退出
jdbc.driver=org.h2.Driver
jdbc.url=jdbc:h2:file:./data/kqsystem;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
jdbc.username=sa
jdbc.password=

# ------------------ Druid 连接池配置 ------------------
jdbc.initialSize=2
jdbc.minIdle=1
jdbc.maxActive=10
jdbc.maxWait=60000
jdbc.validationQuery=SELECT 1
jdbc.testWhileIdle=true
jdbc.testOnReturn=false
jdbc.testOnBorrow=false

# ------------------ MyBatis 配置 ------------------
mybatis.typeAliasesPackage=com.attendance.entity
mybatis.mapperLocations=classpath:mapper/*.xml
mybatis.configuration.mapUnderscoreToCamelCase=true

# ------------------ JWT 配置 ------------------
jwt.secret=KqSystemAttendance2024SecretKey!@#
jwt.expiration=24

# ------------------ 日志配置 ------------------
logging.level.com.attendance=DEBUG
logging.level.org.springframework=INFO
logging.level.org.mybatis=DEBUG

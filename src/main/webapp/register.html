<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考勤管理系统 - 注册</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.39/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .register-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-title h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .register-title p {
      color: #999;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s ease;
      outline: none;
    }

    .form-group input:focus {
      border-color: #667eea;
    }

    .register-btn {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(17, 153, 142, 0.4);
    }

    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
    }

    .success-message {
      color: #27ae60;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="register-container">
      <div class="register-title">
        <h1>注册账号</h1>
        <p>创建您的考勤系统账号</p>
      </div>

      <div class="form-group">
        <label for="username">用户名</label>
        <input 
          id="username" 
          type="text" 
          v-model="username" 
          placeholder="请输入用户名"
        />
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input 
          id="password" 
          type="password" 
          v-model="password" 
          placeholder="请输入密码"
        />
      </div>

      <div class="form-group">
        <label for="realName">真实姓名</label>
        <input 
          id="realName" 
          type="text" 
          v-model="realName" 
          placeholder="请输入真实姓名"
        />
      </div>

      <div class="form-group">
        <label for="phone">手机号</label>
        <input 
          id="phone" 
          type="tel" 
          v-model="phone" 
          placeholder="请输入手机号（选填）"
        />
      </div>

      <button 
        class="register-btn" 
        :disabled="!username || !password || isLoading"
        @click="handleRegister"
      >
        <span v-if="isLoading">注册中...</span>
        <span v-else>注 册</span>
      </button>

      <div class="error-message" v-if="errorMessage">{{ errorMessage }}</div>
      <div class="success-message" v-if="successMessage">{{ successMessage }}</div>

      <div class="login-link">
        已有账号？<a href="login.html">立即登录</a>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue

    createApp({
      setup() {
        const username = ref('')
        const password = ref('')
        const realName = ref('')
        const phone = ref('')
        const isLoading = ref(false)
        const errorMessage = ref('')
        const successMessage = ref('')

        const handleRegister = async () => {
          if (!username.value || !password.value) {
            errorMessage.value = '请输入用户名和密码'
            return
          }

          isLoading.value = true
          errorMessage.value = ''
          successMessage.value = ''

          try {
            const response = await axios.post('/api/register', 
              `username=${encodeURIComponent(username.value)}&password=${encodeURIComponent(password.value)}&realName=${encodeURIComponent(realName.value || '')}&phone=${encodeURIComponent(phone.value || '')}`,
              {
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
              }
            )

            if (response.data.code === 200) {
              successMessage.value = '注册成功！请登录'
              setTimeout(() => {
                window.location.href = 'login.html'
              }, 1500)
            } else {
              errorMessage.value = response.data.message || '注册失败'
            }
          } catch (error) {
            console.error('注册失败:', error)
            errorMessage.value = error.response?.data?.message || '注册失败，请重试'
          } finally {
            isLoading.value = false
          }
        }

        return {
          username,
          password,
          realName,
          phone,
          isLoading,
          errorMessage,
          successMessage,
          handleRegister
        }
      }
    }).mount('#app')
  </script>
</body>
</html>

# ==================================================
# 考勤管理系统 - 数据库及项目配置文件
# ==================================================

# ------------------ 数据库连接配置 ------------------
# 数据库驱动类（MySQL 8.x）
jdbc.driver=com.mysql.cj.jdbc.Driver
# 数据库连接地址
jdbc.url=jdbc:mysql://localhost:3306/attendance_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
# 数据库用户名
jdbc.username=root
# 数据库密码
jdbc.password=123456

# ------------------ Druid 连接池配置 ------------------
# 初始化连接数
jdbc.initialSize=5
# 最小空闲连接数
jdbc.minIdle=5
# 最大活跃连接数
jdbc.maxActive=20
# 获取连接最大等待时间（毫秒）
jdbc.maxWait=60000
# 检测连接是否有效的SQL
jdbc.validationQuery=SELECT 1
# 申请连接时检测有效性
jdbc.testWhileIdle=true
# 归还连接时检测有效性
jdbc.testOnReturn=false
# 获取连接时检测有效性
jdbc.testOnBorrow=false

# ------------------ MyBatis 配置 ------------------
# MyBatis 别名包路径
mybatis.typeAliasesPackage=com.attendance.entity
# MyBatis Mapper XML 文件路径
mybatis.mapperLocations=classpath:mapper/*.xml
# 开启驼峰命名自动映射（如 user_name -> userName）
mybatis.configuration.mapUnderscoreToCamelCase=true

# ------------------ JWT 配置 ------------------
# JWT 签名密钥（生产环境请替换为复杂的随机字符串）
jwt.secret=KqSystemAttendance2024SecretKey!@#
# JWT Token 有效时长（单位：小时）
jwt.expiration=24

# ------------------ 日志配置 ------------------
# 日志级别
logging.level.com.attendance=DEBUG
logging.level.org.springframework=INFO
logging.level.org.mybatis=DEBUG
